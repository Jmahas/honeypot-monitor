<!-- <!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SSH Honeypot Map - T-Pot Style</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            background: #0b0b0b;
            font-family: 'Courier New', monospace;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        /* Panel del contador estilo Hacker */
        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            color: #00ff9d;
            border: 2px solid #00ff9d;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
            pointer-events: none;
        }
        #count {
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="panel">
    SISTEMA DE DETECCIÓN: <br>
    ATAQUES: <span id="count">0</span>
</div>

<div id="map"></div>

<script>
    // 1. Inicialización del Mapa con tema oscuro
    var map = L.map('map', {
        center: [20, 0],
        zoom: 2,
        zoomControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

    // 2. Configuración del Servidor (Destino de los ataques)
    var serverCoords = [40.4168, -3.7038]; // Madrid (puedes ajustarlo a tu ubicación)
    
    // Marcador del servidor (Verde neón con brillo)
    L.circleMarker(serverCoords, {
        radius: 5,
        color: "#2F9AA1",
        fillColor: "#00ff9d",
        fillOpacity: 1,
        weight: 2
    }).addTo(map).bindPopup("<b>MI HONEYPOT</b><br>Escuchando puerto 2222");

    var attackers = {};
    var attackCount = 0;

    // 3. Función matemática para calcular puntos en una curva Bézier cuadrática
    function getQuadraticBezierPoint(t, p0, p1, p2) {
        var lat = (1 - t) * (1 - t) * p0[0] + 2 * (1 - t) * t * p1[0] + t * t * p2[0];
        var lon = (1 - t) * (1 - t) * p0[1] + 2 * (1 - t) * t * p1[1] + t * t * p2[1];
        return [lat, lon];
    }

    // 4. Función principal llamada desde Python (app.py)
    function addAttack(lat, lon, ip, ciudadInfo) {
        attackCount++;
        document.getElementById("count").innerText = attackCount;

        var attackerPos = [lat, lon];
        var key = lat.toFixed(3) + "," + lon.toFixed(3);

        // A. Gestionar el marcador del atacante
        if (!attackers[key]) {
            var marker = L.circleMarker(attackerPos, {
                radius: 6,
                color: "#ff0000",
                fillColor: "#ff0000",
                fillOpacity: 1
            }).addTo(map).bindPopup("<b>IP:</b> " + ip + "<br><b>Loc:</b> " + ciudadInfo);
            
            attackers[key] = { marker: marker, activeLines: 0 };
        } else {
            // Si ya existía y estaba en blanco (inactivo), vuelve a rojo (activo)
            attackers[key].marker.setStyle({ color: "#ff0000", fillColor: "#ff0000" });
        }

        attackers[key].activeLines++;

        // B. Calcular punto de control para la curva
        // Desviamos el centro de la línea para crear el arco
        var controlPoint = [
            (attackerPos[0] + serverCoords[0]) / 2 + 10, 
            (attackerPos[1] + serverCoords[1]) / 2 + 20
        ];

        // Generar los puntos de la línea curva
        var curveLatLngs = [];
        for (var t = 0; t <= 1; t += 0.02) {
            curveLatLngs.push(getQuadraticBezierPoint(t, attackerPos, controlPoint, serverCoords));
        }

        // C. Dibujar la línea curva roja
        var polyline = L.polyline(curveLatLngs, {
            color: "#ff0000",
            weight: 2,
            opacity: 0.6,
            smoothFactor: 1
        }).addTo(map);

        // D. Efecto de Pulso (Radar) en el origen del ataque
        var pulse = L.circleMarker(attackerPos, {
            radius: 7,
            color: "#ff0000",
            weight: 2,
            fill: false
        }).addTo(map);

        var r = 7;
        var pInterval = setInterval(function() {
            r += 2;
            pulse.setRadius(r);
            pulse.setStyle({ opacity: 1 - (r / 60) });
            if (r > 60) {
                map.removeLayer(pulse);
                clearInterval(pInterval);
            }
        }, 30);

        // E. Animación del "Proyectil" (Punto blanco que viaja por la curva)
        var bullet = L.circleMarker(attackerPos, {
            radius: 4,
            color: "#ffffff",
            fillColor: "#ff0000",
            fillOpacity: 1,
            weight: 1
        }).addTo(map);

        var step = 0;
        var bulletAnimation = setInterval(function() {
            step += 0.015; // Velocidad de la animación
            if (step >= 1) {
                map.removeLayer(bullet);
                clearInterval(bulletAnimation);
            } else {
                var pos = getQuadraticBezierPoint(step, attackerPos, controlPoint, serverCoords);
                bullet.setLatLng(pos);
            }
        }, 20);

        // F. Finalización del ataque (Limpieza)
        setTimeout(function() {
            map.removeLayer(polyline);
            attackers[key].activeLines--;

            // Si ya no hay ataques activos en proceso para esta IP, el punto queda en blanco (historial)
            if (attackers[key].activeLines <= 0) {
                attackers[key].marker.setStyle({ color: "#ffffff", fillColor: "#ffffff" });
            }
        }, 4500); // La línea dura 4.5 segundos
    }
</script>

</body>
</html> -->

      }
      var polyline = L.polyline(curveLatLngs, {
        color: "#ff3c3c",
        weight: 1.2, // línea más fina
        opacity: 0.6,
        smoothFactor: 1
      }).addTo(map);

      // Pulso del atacante
      var pulse = L.circleMarker(attackerPos, { radius: 7, color: "#ff3c3c", weight: 2, fill: false }).addTo(map);
      var r = 7;
      var pInterval = setInterval(function () {
        r += 2; pulse.setRadius(r); pulse.setStyle({ opacity: 1 - (r / 60) });
        if (r > 60) { map.removeLayer(pulse); clearInterval(pInterval); }
      }, 30);

      // Proyectil blanco sobre la línea
      var bullet = L.circleMarker(attackerPos, { radius: 4, color: "#ffffff", fillColor: "#ff3c3c", fillOpacity: 1, weight: 1 }).addTo(map);
      var step = 0;
      var bulletAnimation = setInterval(function () {
        step += 0.015;
        if (step >= 1) { map.removeLayer(bullet); clearInterval(bulletAnimation); }
        else {
          var pos = getQuadraticBezierPoint(step, attackerPos, controlPoint, serverCoords);
          bullet.setLatLng(pos);
        }
      }, 20);

      // Limpieza
      setTimeout(function () {
        map.removeLayer(polyline);
        attackers[key].activeLines--;
        if (attackers[key].activeLines <= 0) {
          attackers[key].marker.setStyle({ color: "#ffffff", fillColor: "#ffffff" });
        }
      }, 4500);
    }

    // Ejemplo de ataques de prueba
    // addAttack(51.5074, -0.1278, "192.168.1.1","London, UK");
    // addAttack(35.6895, 139.6917, "192.168.2.2","Tokyo, JP");


    async function pollEvents() {

      try {

        const r = await fetch("/events")
        const events = await r.json()

        events.forEach(e => {

          addAttack(
            e.lat,
            e.lon,
            e.ip,
            e.ciudad + " (" + e.pais + ")"
          )

        })

      } catch (err) {
        console.log(err)
      }
    }

    setInterval(pollEvents, 1000)

</script>
